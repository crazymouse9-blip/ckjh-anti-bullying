<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>第四關｜總務處｜調和程序＋重慶防霸專線</title><style>
:root{--bg:#f6f7fb;--ink:#162033;--card:#fff;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#facc15;--muted:#64748b;--line:#dbe3ef}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(180deg,#eaf2ff,#f7fafc);color:var(--ink)}header{position:sticky;top:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:5}.top{max-width:1050px;margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:900}.badge{background:#e0ecff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:999px;padding:6px 10px;font-weight:700;font-size:13px}.wrap{max-width:1050px;margin:auto;padding:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 12px 35px rgba(31,41,55,.08);padding:18px;margin:14px 0}.hero{text-align:center;padding:34px 18px}.hero h1{font-size:clamp(28px,7vw,48px);margin:8px 0}.sub{color:var(--muted);line-height:1.8}.btn{border:0;border-radius:14px;background:var(--blue);color:#fff;font-weight:900;font-size:16px;padding:12px 16px;cursor:pointer}.btn.light{background:#eef4ff;color:#1d4ed8;border:1px solid #bfdbfe}.btn.green{background:var(--green)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}.input{border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:17px;width:100%;max-width:340px}.notice{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px;padding:12px;line-height:1.8}.ok{color:var(--green);font-weight:900}.bad{color:var(--red);font-weight:900}.article{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;line-height:2;font-size:17px}.hint-card{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:14px;background:#f8fafc;border:1px solid var(--line);border-radius:16px}.hint-char{min-width:42px;text-align:center;border-bottom:2px solid #94a3b8;font-size:25px;font-weight:900;padding:4px 8px;cursor:pointer}.hint-char.sel{background:#fee2e2;color:#b91c1c;border-radius:10px}.board{display:grid;gap:3px;margin:12px auto;user-select:none}.board14{grid-template-columns:repeat(14,1fr)}.board15{grid-template-columns:repeat(15,1fr)}.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid #cbd5e1;background:#fff;border-radius:5px;font-weight:800}.cell.on{background:#fde68a}.answer{font-size:32px;font-weight:1000;text-align:center;color:#1d4ed8;letter-spacing:2px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.drag{border:1px solid #cbd5e1;background:#f8fafc;border-radius:16px;padding:12px;cursor:grab;min-height:120px}.drag b{display:block;margin-bottom:6px}.drag small{font-weight:900;color:#1d4ed8}.quiz button{display:block;width:100%;text-align:left;margin:8px 0;background:#f8fafc;color:var(--ink);border:1px solid #cbd5e1}.simple-table{width:100%;border-collapse:collapse;background:#fff}.simple-table th,.simple-table td{border:1px solid #cbd5e1;padding:9px;text-align:center}.multitable{max-width:360px;margin:auto}.multitable td,.multitable th{width:20%;height:46px;font-weight:900}.prime-wrapper{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;margin:14px auto}.digit-panel{background:#f1f5f9;border-radius:10px;padding:8px;border:1px solid #e2e8f0}.digit-grid{display:grid;grid-template-columns:repeat(4,42px);gap:4px}.prime-cell{width:42px;height:42px;border:1px solid #cbd5e1;background:#f8fafc;font-weight:900;border-radius:4px;cursor:pointer}.prime-cell.mark{background:#ef4444;color:#fff;border-color:#b91c1c;box-shadow:0 0 0 2px rgba(239,68,68,.18) inset}.prime-cell.wrongmark{background:#fef3c7;border-color:#f59e0b;color:#92400e}.digit-label{text-align:center;margin-top:6px;color:#64748b;font-weight:800;font-size:13px}.digital-answer{display:flex;gap:10px;justify-content:center;margin:12px 0}.digital-answer span{min-width:42px;border-bottom:4px solid #1d4ed8;text-align:center;font-size:34px;font-weight:1000;color:#1d4ed8}.marker-tip{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:10px;line-height:1.8}.text-answer{width:min(520px,90%);padding:14px 16px;border-radius:16px;border:2px solid #93c5fd;font-size:20px;margin:16px auto;display:block;text-align:center;font-weight:900}.cert{border:8px double #f59e0b;border-radius:20px;text-align:center;padding:28px;background:#fffdf2}@media(max-width:600px){.cell{font-size:13px}.card{padding:14px}.top{align-items:flex-start;flex-direction:column}.digit-grid{grid-template-columns:repeat(4,34px)}.prime-cell{width:34px;height:34px;font-size:12px}.prime-wrapper{gap:10px}.digit-panel{padding:6px}.digital-answer span{font-size:28px;min-width:34px}}
</style></head><body><header><div class="top"><div class="brand">臺北市立重慶國中｜友善校園實境解謎</div><div class="badge">第四關｜總務處｜調和程序＋重慶防霸專線</div></div></header><main class="wrap"><section class="card"><h1>第四關｜總務處｜調和程序＋重慶防霸專線</h1><div class="notice">請從下列四張圖片卡中找出本校防霸專線。<br>提示：將四張圖片依照事件處理順序排成一線，即可得知解答。</div><div id="sort" class="cards"></div><br><div class="row"><button class="btn" onclick="checkSort()">確認排序</button></div><div class="row"><input id="ans4" class="input" placeholder=""><button class="btn" onclick="check4()">確認答案</button></div><p id="msg4" class="sub"></p></section><div id="result"></div></main><script>
function complete(msg){document.getElementById('result').innerHTML=`<div class="card hero"><h2 class="ok">過關！</h2>${msg}</div>`; window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});}
function norm(v){return (v||'').trim().replace(/\s/g,'').replace('－','-').replace('—','-');}
function isPrime(n){if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true}


let items=[['向學校或透過陳情反應管道提出','259'],['學校受理後進入調和或調查的處理','486'],['尊重雙方當事人及家長或實際照顧者的意願，進入調和或調查程序','31#'],['進入調和程序，由處理小組委員跟當事人訪談，協助雙方化解衝突矛盾','232']].sort(()=>Math.random()-.5);
sort.innerHTML=items.map(x=>`<div class="drag" draggable="true" data-code="${x[1]}"><b>程序卡</b><p>${x[0]}</p><small>${x[1]}</small></div>`).join('');
let d;document.querySelectorAll('.drag').forEach(el=>{el.ondragstart=()=>{d=el;el.style.opacity=.4};el.ondragend=()=>el.style.opacity=1;el.ondragover=e=>{e.preventDefault();let list=sort;let after=[...list.querySelectorAll('.drag:not([style*="opacity: 0.4"])')].find(x=>e.clientY<x.getBoundingClientRect().top+x.offsetHeight/2);list.insertBefore(d,after||null)}});
function checkSort(){let code=[...document.querySelectorAll('.drag')].map(x=>x.dataset.code).join('');if(code==='25948631#232')msg4.textContent='排序正確，請輸入本校防霸專線。';else msg4.textContent='排序尚未符合原本事件處理流程。'}
function check4(){let v=norm(ans4.value);if(v==='25948631#232')complete('<div class="answer">重慶防霸專線：25948631#232</div>');else msg4.textContent='請再試試。'}
</script></body></html>
